<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break Control</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <style>
    /* Simple reset to keep the layout predictable across browsers */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brand-purple: #3512b8;
      --brand-purple-dark: #250083;
      --brand-purple-soft: #efeaff;
      --ink: #1e1b2e;
      --muted: #6b647e;
      --line: #e8e3f5;
      --panel: rgba(255, 255, 255, 0.94);
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 88% 10%, rgba(53, 18, 184, 0.16), transparent 30%),
        radial-gradient(circle at 0% 86%, rgba(53, 18, 184, 0.11), transparent 34%),
        linear-gradient(135deg, #ffffff 0%, #fbfaff 52%, #f0ecff 100%);
      color: var(--ink);
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: auto -120px 8% auto;
      width: 520px;
      height: 190px;
      border-radius: 50%;
      border: 34px solid rgba(53, 18, 184, 0.08);
      transform: rotate(-14deg);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 8% auto auto -130px;
      width: 360px;
      height: 120px;
      border-radius: 50%;
      background: rgba(53, 18, 184, 0.07);
      transform: rotate(-18deg);
      pointer-events: none;
    }

    .app {
      width: min(100%, 980px);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
      padding: 18px 0 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 210px;
      height: 112px;
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 14px 32px rgba(53, 18, 184, 0.13);
      flex: 0 0 auto;
      position: relative;
    }

    .brand-logo img {
      width: 185%;
      height: auto;
      display: block;
      max-width: none;
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
    }

    h1 {
      font-size: 28px;
      line-height: 1.12;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      max-width: 520px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(53, 18, 184, 0.09);
      padding: 18px;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #d7cdec;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 16px;
      background: #ffffff;
      color: var(--ink);
    }

    input:focus,
    select:focus {
      border-color: var(--brand-purple);
      outline: 3px solid rgba(53, 18, 184, 0.18);
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .btn-entry {
      background: var(--brand-purple);
      color: #ffffff;
    }

    .btn-exit {
      background: var(--brand-purple-dark);
      color: #ffffff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .operator-panel {
      display: none;
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .operator-panel.is-visible {
      display: block;
    }

    .operator-grid {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    .operator-actions {
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .operator-actions.is-visible {
      display: flex;
    }

    .operator-state {
      min-height: 20px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .btn-report {
      background: #ffffff;
      border: 1px solid var(--brand-purple);
      color: var(--brand-purple);
      box-shadow: inset 0 0 0 1px rgba(53, 18, 184, 0.08);
    }

    .btn-report:hover {
      background: var(--brand-purple-soft);
    }

    .btn-clear {
      background: #fff1f2;
      border: 1px solid #be123c;
      color: #be123c;
    }

    .btn-login {
      background: var(--brand-purple);
      color: #ffffff;
    }

    .btn-logout {
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .brand-pill {
      border: 1px solid rgba(53, 18, 184, 0.2);
      border-radius: 999px;
      color: var(--brand-purple);
      background: rgba(255, 255, 255, 0.76);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      color: #4b4560;
      font-size: 14px;
    }

    h2 {
      color: var(--brand-purple-dark);
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .counter {
      color: var(--brand-purple);
      font-size: 14px;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    th {
      background: #f7f4ff;
      color: var(--brand-purple-dark);
      font-size: 13px;
      text-transform: uppercase;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-width: 88px;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 700;
      font-size: 12px;
    }

    .badge-entry {
      background: #eee8ff;
      color: var(--brand-purple);
    }

    .badge-exit {
      background: #ede7ff;
      color: var(--brand-purple-dark);
    }

    .empty {
      padding: 28px 12px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      body::before,
      body::after {
        opacity: 0.55;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .brand-logo {
        width: 180px;
        height: 96px;
      }

      h1 {
        font-size: 24px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .operator-grid {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .brand-pill {
        white-space: normal;
      }

      .history-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

  <script>
    // Small JavaScript bridge to download files created by Python.
    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    // Loads Pyodide and runs the Python code embedded in this HTML file.
    async function startPythonApp() {
      const pyodide = await loadPyodide();
      const code = document.getElementById("python-code").textContent;
      await pyodide.runPythonAsync(code);
    }

    startPythonApp().catch((error) => {
      document.getElementById("status").textContent =
        "Python could not be loaded. Check your internet connection and reload the page.";
      console.error(error);
    });
  </script>

  <script id="python-code" type="text/python">
from js import document, localStorage, window
from pyodide.ffi import create_proxy
import json
from datetime import datetime

STORAGE_KEY = "break_control_records"
OPERATOR_PASSWORD = "1111"
operator_logged_in = False

# Interface element references.
name_input = document.getElementById("employeeName")
entry_btn = document.getElementById("entryBtn")
exit_btn = document.getElementById("exitBtn")
export_btn = document.getElementById("exportBtn")
clear_btn = document.getElementById("clearBtn")
operator_password = document.getElementById("operatorPassword")
operator_login_btn = document.getElementById("operatorLoginBtn")
operator_logout_btn = document.getElementById("operatorLogoutBtn")
operator_panel = document.getElementById("operatorPanel")
operator_login_area = document.getElementById("operatorLoginArea")
operator_actions = document.getElementById("operatorActions")
operator_state = document.getElementById("operatorState")
history_box = document.getElementById("history")
status_box = document.getElementById("status")
counter = document.getElementById("counter")


def load_records():
    """Loads saved records from localStorage."""
    raw = localStorage.getItem(STORAGE_KEY)
    if not raw:
        return []
    try:
        data = json.loads(raw)
        return data if isinstance(data, list) else []
    except Exception:
        return []


def save_records(records):
    """Saves the full record list to localStorage."""
    localStorage.setItem(STORAGE_KEY, json.dumps(records, ensure_ascii=False))


def escape_html(value):
    """Prevents user-controlled text from becoming executable HTML."""
    return (
        str(value)
        .replace("&", "&amp;")
        .replace("<", "&lt;")
        .replace(">", "&gt;")
        .replace('"', "&quot;")
        .replace("'", "&#039;")
    )


def now_parts():
    """Returns the current date and time for display."""
    current = datetime.now()
    return current.strftime("%d/%m/%Y"), current.strftime("%H:%M:%S")


def render_history():
    """Updates the break history table shown on screen."""
    records = load_records()
    total = len(records)
    counter.textContent = f"{total} record" if total == 1 else f"{total} records"
    export_btn.disabled = (not operator_logged_in) or total == 0
    clear_btn.disabled = (not operator_logged_in) or total == 0

    if total == 0:
        history_box.innerHTML = '<div class="empty">No break records found.</div>'
        return

    rows = []
    for index, record in enumerate(reversed(records), start=1):
        record_type = escape_html(record.get("type", record.get("tipo", "")))
        badge_class = "badge-entry" if record_type == "Break start" else "badge-exit"
        rows.append(f"""
          <tr>
            <td>{index}</td>
            <td>{escape_html(record.get("employee", record.get("nome", "")))}</td>
            <td><span class="badge {badge_class}">{record_type}</span></td>
            <td>{escape_html(record.get("date", record.get("data", "")))}</td>
            <td>{escape_html(record.get("time", record.get("hora", "")))}</td>
          </tr>
        """)

    history_box.innerHTML = f"""
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Employee</th>
              <th>Type</th>
              <th>Date</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>{''.join(rows)}</tbody>
        </table>
      </div>
    """


def register_point(point_type):
    """Creates a break start or break end record for the selected employee."""
    employee_name = name_input.value.strip()
    if not employee_name:
        status_box.textContent = "Select an employee before registering the break."
        name_input.focus()
        return
    if employee_name == "Operator":
        status_box.textContent = "Operator is for reports and history reset only."
        operator_password.focus()
        return

    date_text, time_text = now_parts()
    records = load_records()
    records.append({
        "employee": employee_name,
        "type": point_type,
        "date": date_text,
        "time": time_text,
        "registered_at": datetime.now().isoformat(timespec="seconds"),
    })
    save_records(records)
    render_history()
    status_box.textContent = f"{point_type} recorded for {employee_name} on {date_text} at {time_text}."


def make_csv_value(value):
    """Formats CSV fields so they open correctly in Excel."""
    text = str(value).replace('"', '""')
    return f'"{text}"'


def export_report(event=None):
    """Generates an Excel-compatible CSV file using saved records."""
    if not operator_logged_in:
        operator_state.textContent = "Operator login required before exporting reports."
        operator_password.focus()
        return

    records = load_records()
    if not records:
        status_box.textContent = "There are no records to export."
        return

    header = ["Employee", "Type", "Date", "Time", "Registered at"]
    lines = [";".join(header)]
    for record in records:
        lines.append(";".join([
            make_csv_value(record.get("employee", record.get("nome", ""))),
            make_csv_value(record.get("type", record.get("tipo", ""))),
            make_csv_value(record.get("date", record.get("data", ""))),
            make_csv_value(record.get("time", record.get("hora", ""))),
            make_csv_value(record.get("registered_at", record.get("registrado_em", ""))),
        ]))

    content = "\ufeff" + "\n".join(lines)
    filename = f"break-report-{datetime.now().strftime('%Y-%m-%d-%H-%M-%S')}.csv"
    window.downloadFile(filename, content, "text/csv;charset=utf-8")
    status_box.textContent = "Report exported. Open the CSV file in Excel to review it."


def clear_history(event=None):
    """Resets all break records after operator confirmation."""
    if not operator_logged_in:
        operator_state.textContent = "Operator login required before resetting history."
        operator_password.focus()
        return

    if window.confirm("Reset all break history? This action cannot be undone."):
        localStorage.removeItem(STORAGE_KEY)
        render_history()
        status_box.textContent = "Break history reset by operator."


def render_operator_state():
    """Updates operator-only controls."""
    is_operator_selected = name_input.value.strip() == "Operator"

    if not is_operator_selected:
        operator_panel.classList.remove("is-visible")
        operator_actions.classList.remove("is-visible")
        operator_login_area.style.display = "grid"
        operator_password.value = ""
        render_history()
        return

    operator_panel.classList.add("is-visible")

    if operator_logged_in:
        operator_login_area.style.display = "none"
        operator_actions.classList.add("is-visible")
        operator_state.textContent = "Operator mode active. Reports and history reset are enabled."
    else:
        operator_login_area.style.display = "grid"
        operator_actions.classList.remove("is-visible")
        operator_state.textContent = "Operator login required to export reports or reset history."

    render_history()


def operator_login(event=None):
    """Enables protected operator actions when the password is correct."""
    global operator_logged_in
    if operator_password.value == OPERATOR_PASSWORD:
        operator_logged_in = True
        operator_password.value = ""
        render_operator_state()
        status_box.textContent = "Operator logged in."
        return

    operator_logged_in = False
    operator_password.value = ""
    render_operator_state()
    operator_state.textContent = "Incorrect operator password."
    operator_password.focus()


def operator_logout(event=None):
    """Closes operator mode for this page session."""
    global operator_logged_in
    operator_logged_in = False
    render_operator_state()
    status_box.textContent = "Operator logged out."


def operator_password_keydown(event=None):
    """Allows pressing Enter to log in."""
    if event and event.key == "Enter":
        operator_login()


def update_buttons(event=None):
    """Enables break buttons for employees and shows operator login when needed."""
    global operator_logged_in
    selected_name = name_input.value.strip()
    is_operator_selected = selected_name == "Operator"
    has_employee = bool(selected_name) and not is_operator_selected

    entry_btn.disabled = not has_employee
    exit_btn.disabled = not has_employee

    if not is_operator_selected and operator_logged_in:
        operator_logged_in = False

    render_operator_state()


# Interface button events. References are kept so the handlers stay active
# while the page is open.
event_handlers = [
    create_proxy(lambda event: register_point("Break start")),
    create_proxy(lambda event: register_point("Break end")),
    create_proxy(export_report),
    create_proxy(clear_history),
    create_proxy(operator_login),
    create_proxy(operator_logout),
    create_proxy(operator_password_keydown),
    create_proxy(update_buttons),
]

entry_btn.addEventListener("click", event_handlers[0])
exit_btn.addEventListener("click", event_handlers[1])
export_btn.addEventListener("click", event_handlers[2])
clear_btn.addEventListener("click", event_handlers[3])
operator_login_btn.addEventListener("click", event_handlers[4])
operator_logout_btn.addEventListener("click", event_handlers[5])
operator_password.addEventListener("keydown", event_handlers[6])
name_input.addEventListener("change", event_handlers[7])

update_buttons()
status_box.textContent = "System ready to register breaks."
  </script>
</body>
</html>
